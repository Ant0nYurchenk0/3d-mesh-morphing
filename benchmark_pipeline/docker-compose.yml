# ============================================================
# Image-to-3D Evaluation Pipeline — Docker Compose
# ============================================================
#
# Prerequisites:
#   1. Copy .env.example → .env and set HF_TOKEN
#   2. docker compose build
#
# Usage examples:
#   # Full matrix (all shapes × all models from config.yaml)
#   docker compose run benchmark_pipeline
#
#   # Subset
#   docker compose run benchmark_pipeline --shapes dragon,skull --models trellis,hunyuan3d
#
#   # Dry run (download + render only, no model API calls)
#   docker compose run benchmark_pipeline --dry-run --shapes dragon
#
#   # List available shapes/models
#   docker compose run pipeline --list
#
# Sessions are bind-mounted so artifacts appear on the host at ./sessions/
# ============================================================

services:
  benchmark_pipeline:
    build:
      # Build context is the repo root so COPY pipeline/ works correctly
      context: ..
      dockerfile: benchmark_pipeline/Dockerfile

    environment:
      # HuggingFace token — loaded from .env file (never commit .env)
      - HF_TOKEN=${HF_TOKEN}
      # OSMesa renderer (redundant with Dockerfile ENV, but explicit here too)
      - PYOPENGL_PLATFORM=osmesa
      # Configurable API delay between calls (override default from config.yaml)
      - API_DELAY_SECONDS=${API_DELAY_SECONDS:-2.0}
      # Uncomment to force matplotlib renderer for debugging
      # - FORCE_MATPLOTLIB=1

    volumes:
      # Session artifacts persist on the host outside the container
      - ./sessions:/app/benchmark_pipeline/sessions
      # Mesh download cache persists between runs
      - ./cache:/app/benchmark_pipeline/cache
      # Mount config so edits take effect without rebuilding the image
      - ./config.yaml:/app/benchmark_pipeline/config.yaml:ro


