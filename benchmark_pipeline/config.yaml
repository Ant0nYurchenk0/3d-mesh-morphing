# ============================================================
# Image-to-3D Evaluation Pipeline — Configuration
# ============================================================
# Adding a new shape or model only requires editing this file.
# No code changes needed.
#
# Mesh sources (tried in order):
#   1. thingi10k package (if download_strategy: auto or package_only)
#   2. Thingi10K HTTP download by thingiverse_id (if download_strategy: auto or http_only)
#   3. Trimesh procedural primitive (if use_primitive_fallback: true — the default)
#
# Thingi10K IDs: the dataset contains a specific set of 10K Thingiverse thing-IDs.
# Not every Thingiverse ID is in the dataset, so HTTP download may return 404.
# To find valid IDs:
#   - Browse https://ten-thousand-models.appspot.com/ and note working IDs
#   - Or use: uv sync --extra dataset && uv run python -c "
#       import thingi10k; entries = list(thingi10k.dataset(query='gear'))
#       print([(e['file_id'], e.get('tags','')) for e in entries[:5]])"
# Set the found IDs below. If no valid ID is known, the primitive fallback is used.
# ============================================================

shapes:
  # ── Complex organic shapes from Thingi10K ──────────────────────────────
  # thingi10k_file_id: loaded directly from the local HF-cached dataset
  # (no CLIP/semantic search needed). Requires: uv sync --extra dataset

  shape_37384:
